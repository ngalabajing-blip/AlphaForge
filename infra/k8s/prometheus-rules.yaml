apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: alphaforge-api-rules
  namespace: alphaforge
  labels:
    release: prometheus
spec:
  groups:
    - name: alphaforge-api
      interval: 30s
      rules:
        - alert: ApiHighErrorRate
          expr: sum(rate(alphaforge_api_requests_total{status=~"5.."}[5m])) / sum(rate(alphaforge_api_requests_total[5m])) > 0.01
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "API 5xx rate > 1%"
            description: "More than 1% of API requests have returned 5xx for 10m."
        - alert: ApiHighLatency
          expr: histogram_quantile(0.95, sum(rate(alphaforge_api_request_duration_seconds_bucket[5m])) by (le)) > 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "API p95 > 500ms"
        - alert: WorkerBacklogHigh
          expr: alphaforge_worker_queue_length > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Celery queue length above 1k"
