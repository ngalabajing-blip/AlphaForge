apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: alphaforge
spec:
  serviceName: kafka
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.7
          env:
            - { name: KAFKA_CFG_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CFG_NODE_ID, value: "1" }
            - { name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS, value: "1@kafka-0.kafka:9093" }
            - { name: KAFKA_CFG_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_CFG_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP, value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT" }
          ports:
            - containerPort: 9092
            - containerPort: 9093
          volumeMounts:
            - { name: data, mountPath: /bitnami/kafka }
          resources:
            requests: { cpu: "300m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi"   }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 20Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: alphaforge
spec:
  clusterIP: None
  selector: { app: kafka }
  ports:
    - { name: broker,     port: 9092, targetPort: 9092 }
    - { name: controller, port: 9093, targetPort: 9093 }
