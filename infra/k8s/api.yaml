apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaforge-api
  namespace: alphaforge
  labels: { app: alphaforge-api }
spec:
  replicas: 2
  selector: { matchLabels: { app: alphaforge-api } }
  template:
    metadata:
      labels: { app: alphaforge-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/alphaforge/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: alphaforge-config }
            - secretRef:    { name: alphaforge-secrets }
          readinessProbe:
            httpGet: { path: /api/v1/healthz, port: 8000 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/v1/healthz, port: 8000 }
            periodSeconds: 30
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi"   }
---
apiVersion: v1
kind: Service
metadata:
  name: alphaforge-api
  namespace: alphaforge
spec:
  selector: { app: alphaforge-api }
  ports: [{ port: 8000, targetPort: 8000 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alphaforge-api
  namespace: alphaforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: alphaforge-api
spec:
  ingressClassName: nginx
  rules:
    - host: api.alphaforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alphaforge-api
                port: { number: 8000 }
