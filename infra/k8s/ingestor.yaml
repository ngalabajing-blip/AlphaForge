apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaforge-ingestor
  namespace: alphaforge
  labels: { app: alphaforge-ingestor }
spec:
  replicas: 1
  selector: { matchLabels: { app: alphaforge-ingestor } }
  template:
    metadata: { labels: { app: alphaforge-ingestor } }
    spec:
      containers:
        - name: ingestor
          image: ghcr.io/alphaforge/ingestor:latest
          envFrom:
            - configMapRef: { name: alphaforge-config }
            - secretRef:    { name: alphaforge-secrets }
          resources:
            requests: { cpu: "300m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "1Gi"   }
