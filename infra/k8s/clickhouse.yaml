apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse-server
  namespace: alphaforge
spec:
  serviceName: clickhouse-server
  replicas: 1
  selector: { matchLabels: { app: clickhouse-server } }
  template:
    metadata: { labels: { app: clickhouse-server } }
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.3
          ports:
            - { containerPort: 8123 }
            - { containerPort: 9000 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/clickhouse }
          resources:
            requests: { cpu: "300m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "4Gi"   }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 50Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-server
  namespace: alphaforge
spec:
  selector: { app: clickhouse-server }
  ports:
    - { name: http,   port: 8123, targetPort: 8123 }
    - { name: native, port: 9000, targetPort: 9000 }
