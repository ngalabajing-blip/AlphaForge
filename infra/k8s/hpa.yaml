apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alphaforge-api
  namespace: alphaforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alphaforge-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 80 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alphaforge-worker
  namespace: alphaforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alphaforge-worker
  minReplicas: 2
  maxReplicas: 16
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
