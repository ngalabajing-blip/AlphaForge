apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: alphaforge
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - { name: POSTGRES_USER,     value: alphaforge }
            - { name: POSTGRES_PASSWORD, value: alphaforge }
            - { name: POSTGRES_DB,       value: alphaforge }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "alphaforge"] }
            periodSeconds: 5
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi"   }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 20Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: alphaforge
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
