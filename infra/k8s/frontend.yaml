apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaforge-frontend
  namespace: alphaforge
  labels: { app: alphaforge-frontend }
spec:
  replicas: 2
  selector: { matchLabels: { app: alphaforge-frontend } }
  template:
    metadata: { labels: { app: alphaforge-frontend } }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/alphaforge/frontend:latest
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: alphaforge-frontend
  namespace: alphaforge
spec:
  selector: { app: alphaforge-frontend }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alphaforge-frontend
  namespace: alphaforge
spec:
  ingressClassName: nginx
  rules:
    - host: app.alphaforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alphaforge-frontend
                port: { number: 80 }
