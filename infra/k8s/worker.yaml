apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaforge-worker
  namespace: alphaforge
  labels: { app: alphaforge-worker }
spec:
  replicas: 2
  selector: { matchLabels: { app: alphaforge-worker } }
  template:
    metadata: { labels: { app: alphaforge-worker } }
    spec:
      containers:
        - name: worker
          image: ghcr.io/alphaforge/worker:latest
          command: ["celery", "-A", "alphaforge_worker.celery_app:celery_app", "worker", "--loglevel=INFO"]
          envFrom:
            - configMapRef: { name: alphaforge-config }
            - secretRef:    { name: alphaforge-secrets }
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi"   }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaforge-worker-beat
  namespace: alphaforge
  labels: { app: alphaforge-worker-beat }
spec:
  replicas: 1
  selector: { matchLabels: { app: alphaforge-worker-beat } }
  template:
    metadata: { labels: { app: alphaforge-worker-beat } }
    spec:
      containers:
        - name: beat
          image: ghcr.io/alphaforge/worker:latest
          command: ["celery", "-A", "alphaforge_worker.celery_app:celery_app", "beat", "--loglevel=INFO"]
          envFrom:
            - configMapRef: { name: alphaforge-config }
            - secretRef:    { name: alphaforge-secrets }
