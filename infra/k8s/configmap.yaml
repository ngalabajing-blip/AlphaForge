apiVersion: v1
kind: ConfigMap
metadata:
  name: alphaforge-config
  namespace: alphaforge
data:
  APP_ENV: "production"
  APP_LOG_LEVEL: "INFO"
  DATABASE_URL: "postgresql+asyncpg://alphaforge:alphaforge@postgres:5432/alphaforge"
  REDIS_URL: "redis://redis:6379/0"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  CLICKHOUSE_URL: "clickhouse-server:9000"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
