{{- if .Values.services.api.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "alphaforge.fullname" . }}-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "alphaforge.fullname" . }}-api
  minReplicas: {{ .Values.services.api.autoscaling.min }}
  maxReplicas: {{ .Values.services.api.autoscaling.max }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.services.api.autoscaling.targetCPU }}
{{- end }}
