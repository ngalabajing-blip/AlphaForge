global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: alphaforge-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
  - job_name: alphaforge-ml
    static_configs:
      - targets: ["ml:9301"]
  - job_name: alphaforge-worker
    static_configs:
      - targets: ["worker:9302"]
  - job_name: alphaforge-ingestor
    static_configs:
      - targets: ["ingestor:9303"]
  - job_name: alphaforge-notifier
    static_configs:
      - targets: ["notifier:9304"]
  - job_name: alphaforge-auditor
    static_configs:
      - targets: ["auditor:9305"]
