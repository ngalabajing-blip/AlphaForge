name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install "ruff==0.15.12" "black==26.3.1" "mypy==1.20.2"
      - run: ruff check shared services
      - run: black --check shared services
      - run: mypy shared/src services/api/src services/worker/src || true

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, ingestor, ml, worker, notifier, auditor]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install
        run: |
          pip install -e shared
          pip install -e "services/${{ matrix.service }}[dev]"
      - name: Test
        run: pytest "services/${{ matrix.service }}" -v

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path services/quantcore/Cargo.toml
      - run: cargo clippy --manifest-path services/quantcore/Cargo.toml --all-targets

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - run: cd frontend && npm install --no-audit --no-fund
      - run: cd frontend && npm run typecheck
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run test

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            file: services/api/Dockerfile
          - service: ingestor
            context: .
            file: services/ingestor/Dockerfile
          - service: ml
            context: .
            file: services/ml/Dockerfile
          - service: worker
            context: .
            file: services/worker/Dockerfile
          - service: notifier
            context: .
            file: services/notifier/Dockerfile
          - service: auditor
            context: .
            file: services/auditor/Dockerfile
          - service: frontend
            context: .
            file: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: ghcr.io/alphaforge/${{ matrix.service }}:ci
