name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, ingestor, ml, worker, notifier, auditor, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/alphaforge/${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/alphaforge/${{ matrix.service }}:latest
