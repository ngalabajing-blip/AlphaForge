version: "3.9"

# Dev overrides: bind-mount source for hot reload, expose dev ports.

services:
  api:
    command: ["uvicorn", "alphaforge_api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./services/api/src:/app/src
      - ./shared/src:/app/shared

  ingestor:
    command: ["python", "-m", "alphaforge_ingestor.main", "--reload"]
    volumes:
      - ./services/ingestor/src:/app/src
      - ./shared/src:/app/shared

  worker:
    command: ["watchmedo", "auto-restart", "--pattern=*.py", "--recursive", "--", "celery", "-A", "alphaforge_worker.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    volumes:
      - ./services/worker/src:/app/src
      - ./shared/src:/app/shared

  ml:
    command: ["uvicorn", "alphaforge_ml.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    volumes:
      - ./services/ml/src:/app/src

  auditor:
    command: ["uvicorn", "alphaforge_auditor.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    volumes:
      - ./services/auditor/src:/app/src

  notifier:
    command: ["uvicorn", "alphaforge_notifier.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload"]
    volumes:
      - ./services/notifier/src:/app/src
